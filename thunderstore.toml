[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "UpgradeFiltering"
description = "Advanced upgrade filtering and customizable priority sorting for the gear details menu."
websiteUrl = "https://github.com/Little-Sparroh/UpgradeFiltering"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"
Sparroh-SparrohUILib = "1.1.1"


[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/UpgradeFiltering.dll"
target = "BepInEx/plugins/UpgradeFiltering.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
