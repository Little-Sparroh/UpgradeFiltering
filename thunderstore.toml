[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "ImprovedUpgradeSorting"
description = "Includes sorting by instance name rather than prefab name. Adds filtering options."
websiteUrl = "https://github.com/Little-Sparroh/ImprovedUpgradeSorting"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/ImprovedUpgradeSorting.dll"
target = "BepInEx/plugins/ImprovedUpgradeSorting.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]


